# Project Registry
# Central source of truth for all project metadata. Used by install.sh, hooks,
# and Claude Code. This file is the example registry that ships with the
# toolkit; replace the entries below with your own projects.
#
# Format (pipe-delimited):
#   shortname|github-repo|project-file|icon|tech|base-branch|jira-prefix|build-tool
#
# - shortname:    Used in skills, agents, and hooks to reference the project
# - github-repo:  GitHub repo name (owner is set via PROJECT_GITHUB_OWNER env var)
# - project-file: Project instruction file in projects/ (empty = no instructions)
# - icon:         Nerd Font icon for the statusline (optional)
# - tech:         Tech stack description (surfaces in Claude's context)
# - base-branch:  Default branch for PRs
# - jira-prefix:  Jira ticket prefix(es); use "—" if not applicable
# - build-tool:   Primary build command shown to Claude
#
# Lines starting with # are comments. Empty lines are ignored.

# Example projects — five representative stacks. Edit or replace with your own.
mobile|demo-mobile|mobile.md||Flutter (FVM)|main|MOB-|fvm flutter / fvm dart
web|demo-web|web.md||TypeScript / Next.js (pnpm)|main|WEB-|pnpm
api|demo-api|api.md||Kotlin / Ktor (Gradle)|main|API-|./gradlew
server|demo-server|server.md||Python 3.12 / FastAPI (uv)|main|SRV-|uv / pytest
infra|demo-infra|infra.md||Terraform + Helm (GitOps)|main|INF-|terraform / helm
